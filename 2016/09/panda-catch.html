<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>🐼 熊猫接笋</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  width:100%;height:100%;overflow:hidden;
  background:radial-gradient(ellipse at 50% 60%,#0d2a10 0%,#050e06 100%);
  display:flex;align-items:center;justify-content:center;
  font-family:'Segoe UI',system-ui,sans-serif;
  user-select:none;
}

/* ═══ 外框 ═══════════════════════════════ */
#wrap{
  position:relative;
  border-radius:22px;
  overflow:hidden;
  box-shadow:
    0 0 0 3px #4caf50,
    0 0 0 6px #1b5e20,
    0 24px 80px #000d,
    0 0 140px #1b5e2055;
}
canvas{display:block;}

/* ═══ HUD ════════════════════════════════ */
#hud{
  position:absolute;top:0;left:0;right:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;
  pointer-events:none;z-index:10;
}
.hud-box{
  background:linear-gradient(135deg,rgba(0,40,0,.80),rgba(0,70,10,.65));
  border:1.5px solid rgba(100,220,80,.35);
  border-radius:14px;
  padding:5px 16px;
  backdrop-filter:blur(8px);
  color:#fff;font-size:.92rem;letter-spacing:1px;
}
.hud-box span{
  color:#a5f060;font-weight:700;font-size:1.15rem;
  display:inline-block;transition:transform .18s;
}
.hud-box.pop span{transform:scale(1.55);}
/* 最高分徽章 */
#bestBox{
  background:linear-gradient(135deg,rgba(80,50,0,.85),rgba(120,80,0,.70));
  border-color:rgba(255,200,50,.4);
}
#bestBox span{color:#ffd740;}

/* ═══ 覆盖层 ══════════════════════════════ */
#screen{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:20;pointer-events:auto;
  background:transparent;
  transition:background .4s;
}
#screen.dim{background:rgba(0,0,0,.55);}

/* 毛玻璃卡片 */
.card{
  background:linear-gradient(160deg,rgba(8,35,8,.92),rgba(4,20,4,.96));
  border:1.5px solid rgba(120,230,80,.3);
  border-radius:28px;
  padding:34px 48px 30px;
  text-align:center;
  box-shadow:0 10px 50px #000c, 0 0 80px rgba(70,190,40,.12);
  backdrop-filter:blur(14px);
  max-width:380px;width:90%;
  animation:cardIn .45s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes cardIn{
  from{opacity:0;transform:scale(.65) translateY(50px);}
  to{opacity:1;transform:scale(1) translateY(0);}
}

/* 标题渐变流光 */
.title-text{
  font-size:2.7rem;font-weight:900;letter-spacing:5px;
  background:linear-gradient(100deg,#80ff40,#39d353,#c8ff70,#39d353,#80ff40);
  background-size:300% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:shine 3.5s linear infinite;
  margin-bottom:4px;
}
@keyframes shine{to{background-position:300% center;}}
.subtitle{color:#66a850;font-size:.9rem;letter-spacing:4px;margin-bottom:20px;}

/* 规则卡 */
.rules{display:flex;gap:10px;margin-bottom:22px;flex-wrap:wrap;justify-content:center;}
.rule-item{
  background:rgba(255,255,255,.055);
  border:1px solid rgba(255,255,255,.10);
  border-radius:14px;padding:10px 14px;
  color:#ccc;font-size:.88rem;line-height:1.9;min-width:80px;
}
.rule-item .pos{color:#90ee40;}
.rule-item .gold{color:#ffd740;font-weight:700;}
.rule-item .neg{color:#ff6060;}

/* 按钮 */
.btn{
  display:inline-block;
  background:linear-gradient(135deg,#5dcc30,#2a8f10);
  color:#fff;border:none;
  padding:13px 46px;
  font-size:1.15rem;font-weight:700;
  border-radius:50px;cursor:pointer;letter-spacing:3px;
  box-shadow:0 4px 20px #1a7a0870,0 0 0 0 #5dcc3040;
  transition:transform .12s;
  animation:pulse-btn 2.6s ease-in-out infinite;
}
.btn:hover{transform:scale(1.07);}
.btn:active{transform:scale(.95);}
@keyframes pulse-btn{
  0%,100%{box-shadow:0 4px 20px #1a7a0870,0 0 0 0 #5dcc3000;}
  50%{box-shadow:0 4px 20px #1a7a0870,0 0 0 16px #5dcc3000;}
}
.btn-secondary{
  background:linear-gradient(135deg,#444,#222);
  margin-left:12px;padding:13px 28px;letter-spacing:2px;
  animation:none;
  box-shadow:0 4px 16px #0008;
}

.hint{color:#5a9445;font-size:.78rem;margin-top:10px;letter-spacing:1px;}

/* ═══ 结束画面专属 ════════════════════════ */
.over-title{
  font-size:2.2rem;font-weight:900;letter-spacing:3px;
  margin-bottom:6px;
}
.over-title.normal{color:#e8ffe0;}
.over-title.record{
  background:linear-gradient(100deg,#ffd700,#fff176,#ffa000,#ffd700);
  background-size:300% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:shine 2s linear infinite;
}

.score-display{
  font-size:4rem;font-weight:900;
  color:#ffd740;
  text-shadow:0 0 30px #ffb30080,0 2px 0 #a06000;
  line-height:1;margin:8px 0 4px;
  animation:scorePop .5s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes scorePop{from{transform:scale(0) rotate(-10deg);}to{transform:scale(1) rotate(0deg);}}

.record-badge{
  display:inline-block;
  background:linear-gradient(135deg,#ffd700,#ff8c00);
  color:#3a2000;font-weight:800;font-size:.85rem;
  padding:3px 14px;border-radius:20px;
  box-shadow:0 0 18px #ffd70080;
  margin-bottom:10px;
  animation:badgePop .4s .2s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes badgePop{from{transform:scale(0);}to{transform:scale(1);}}

.stat-row{
  display:flex;gap:12px;justify-content:center;margin:10px 0 20px;
}
.stat-box{
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.10);
  border-radius:12px;padding:8px 16px;
  color:#aaa;font-size:.82rem;line-height:1.7;
}
.stat-box b{color:#ffd740;font-size:1rem;display:block;}

/* 历史榜 */
.hist-title{color:#666;font-size:.75rem;margin-bottom:6px;letter-spacing:2px;}
.hist-list{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:18px;}
.hist-chip{
  background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.2);
  border-radius:8px;padding:3px 10px;
  color:#c8a840;font-size:.8rem;
}
.hist-chip.first{background:rgba(255,215,0,.18);color:#ffd740;font-weight:700;}

/* 难度标签 */
#diffBadge{
  position:absolute;bottom:28px;right:14px;
  font-size:.7rem;letter-spacing:1px;
  color:#ffcc00;background:rgba(0,0,0,.4);
  border-radius:8px;padding:3px 8px;
  pointer-events:none;opacity:.7;
}

/* 星星层 */
#starCanvas{position:absolute;inset:0;pointer-events:none;z-index:1;}

/* 新纪录烟花层（CSS 动画粒子） */
.firework{
  position:absolute;pointer-events:none;z-index:25;
  width:6px;height:6px;border-radius:50%;
}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="starCanvas"></canvas>
  <canvas id="gameCanvas" width="480" height="620"></canvas>

  <!-- HUD -->
  <div id="hud">
    <div class="hud-box" id="scoreBox">🎋&ensp;<span id="scoreVal">0</span></div>
    <div class="hud-box" id="bestBox">🏆&ensp;<span id="bestVal">0</span></div>
    <div class="hud-box" id="lvlBox" style="font-size:.8rem">⚡&ensp;<span id="lvlVal">Lv.1</span></div>
  </div>

  <span id="diffBadge"></span>

  <div id="screen">
    <div class="card" id="card"></div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════
   DOM & 常量
═══════════════════════════════════════════════ */
const gc   = document.getElementById('gameCanvas');
const ctx  = gc.getContext('2d');
const sc   = document.getElementById('starCanvas');
const sctx = sc.getContext('2d');
const W = gc.width, H = gc.height;
sc.width = W; sc.height = H;

const $scoreVal  = document.getElementById('scoreVal');
const $bestVal   = document.getElementById('bestVal');
const $lvlVal    = document.getElementById('lvlVal');
const $scoreBox  = document.getElementById('scoreBox');
const $bestBox   = document.getElementById('bestBox');
const $screen    = document.getElementById('screen');
const $card      = document.getElementById('card');
const $diffBadge = document.getElementById('diffBadge');

/* ═══════════════════════════════════════════════
   最高分 & 历史榜（localStorage）
═══════════════════════════════════════════════ */
const LS_BEST = 'pandaBest';
const LS_HIST = 'pandaHist';  // 最近5次分数

function getBest(){ return parseInt(localStorage.getItem(LS_BEST)||'0'); }
function getHist(){ try{ return JSON.parse(localStorage.getItem(LS_HIST)||'[]'); }catch{return [];} }

function saveBest(s){
  const prev = getBest();
  const isNew = s > prev;
  if(isNew) localStorage.setItem(LS_BEST, s);
  // 历史记录
  const hist = getHist();
  hist.unshift(s);
  localStorage.setItem(LS_HIST, JSON.stringify(hist.slice(0,5)));
  return isNew;
}

// 初始化 HUD 最高分
$bestVal.textContent = getBest();

/* ═══════════════════════════════════════════════
   竹林背景（一次性生成）
═══════════════════════════════════════════════ */
const bamboos = Array.from({length:16},(_,i)=>({
  x: 10 + i*30 + Math.random()*12,
  w: 9  + Math.random()*7,
  h: 140+ Math.random()*230,
  hue: 105+Math.random()*30,
  sat: 38+Math.random()*20,
  lit: 22+Math.random()*16
}));

/* ═══════════════════════════════════════════════
   星星（覆盖层背景）
═══════════════════════════════════════════════ */
const stars = Array.from({length:60},()=>({
  x:Math.random()*W, y:Math.random()*H,
  r:Math.random()*2+.4,
  a:Math.random(), da:(.003+Math.random()*.005)*(Math.random()<.5?1:-1)
}));
let starRaf;
function animateStars(){
  sctx.clearRect(0,0,W,H);
  stars.forEach(s=>{
    s.a+=s.da; if(s.a<=0||s.a>=1) s.da*=-1;
    sctx.globalAlpha=s.a*.65;
    sctx.fillStyle='#c8f5a0';
    sctx.beginPath(); sctx.arc(s.x,s.y,s.r,0,Math.PI*2); sctx.fill();
  });
  sctx.globalAlpha=1;
  if(!gameRunning) starRaf=requestAnimationFrame(animateStars);
}

/* ═══════════════════════════════════════════════
   游戏状态
═══════════════════════════════════════════════ */
let score,items,panda,keys={},animId,gameRunning=false,lastTime,
    spawnTimer,spawnInterval,speedFactor,
    particles,floatTexts,
    bgTime=0, pandaWobble=0, shakeTimer=0,
    goldenGlowT=0; // 金色笋接住时的全屏金光计时

function initGame(){
  score=0; items=[]; particles=[]; floatTexts=[];
  spawnTimer=0; spawnInterval=1350; speedFactor=1;
  lastTime=null; shakeTimer=0; pandaWobble=0; goldenGlowT=0;
  $scoreVal.textContent='0';
  $lvlVal.textContent='Lv.1';
  $diffBadge.textContent='';
  $bestVal.textContent=getBest();
  panda={x:W/2,y:H-58,w:76,h:76,speed:350,targetX:W/2,squish:1};
}

/* ═══════════════════════════════════════════════
   难度
═══════════════════════════════════════════════ */
function getDifficulty(){
  if(score<50)  return {level:1,label:'🌱 入门',chiliRate:.26,goldenRate:.04};
  if(score<150) return {level:2,label:'🌿 一般',chiliRate:.30,goldenRate:.05};
  if(score<300) return {level:3,label:'🎋 挑战',chiliRate:.34,goldenRate:.06};
  if(score<500) return {level:4,label:'🔥 困难',chiliRate:.38,goldenRate:.07};
  return               {level:5,label:'💀 地狱',chiliRate:.42,goldenRate:.08};
}

/* ═══════════════════════════════════════════════
   掉落物生成（新增 golden 类型）
═══════════════════════════════════════════════ */
function spawnItem(){
  const {chiliRate,goldenRate}=getDifficulty();
  const rnd=Math.random();
  let type,r;
  if(rnd < goldenRate)          { type='golden'; r=20; }
  else if(rnd < goldenRate+chiliRate){ type='chili';  r=15; }
  else                           { type='bamboo'; r=17; }

  items.push({
    x:34+Math.random()*(W-68), y:-34,
    vy:(type==='golden'?90:120+Math.random()*85)*speedFactor,
    type, r,
    angle:Math.random()*Math.PI*2,
    spin:(Math.random()-.5)*(type==='golden'?2:3.5),
    scaleIn:0,
    // 金色笋专属：发光脉冲计时
    glowT:0
  });
}

/* ═══════════════════════════════════════════════
   背景绘制（昼夜渐变）
═══════════════════════════════════════════════ */
function lerpCol(a,b,t){
  const pa=parseInt(a.slice(1),16),pb=parseInt(b.slice(1),16);
  const r=((pa>>16)+(((pb>>16)-(pa>>16))*t))|0;
  const g=(((pa>>8)&0xff)+((((pb>>8)&0xff)-((pa>>8)&0xff))*t))|0;
  const bl=((pa&0xff)+(((pb&0xff)-(pa&0xff))*t))|0;
  return`rgb(${r},${g},${bl})`;
}
function drawBackground(dt){
  bgTime+=dt*.07;
  const t=Math.sin(bgTime)*.5+.5;
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,lerpCol('#0d1f0d','#1b5e20',t));
  sky.addColorStop(1,lerpCol('#1a331a','#2e7d32',t));
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

  // 顶部光晕
  const glow=ctx.createRadialGradient(W/2,0,10,W/2,0,260);
  glow.addColorStop(0,`rgba(140,255,90,${.05*t})`);
  glow.addColorStop(1,'transparent');
  ctx.fillStyle=glow; ctx.fillRect(0,0,W,H);

  // 金色笋全屏金光
  if(goldenGlowT>0){
    goldenGlowT-=dt;
    const gp=Math.max(0,goldenGlowT/.6);
    const gg=ctx.createRadialGradient(W/2,H/2,40,W/2,H/2,W*.8);
    gg.addColorStop(0,`rgba(255,220,50,${.22*gp})`);
    gg.addColorStop(1,`rgba(255,160,0,${.06*gp})`);
    ctx.fillStyle=gg; ctx.fillRect(0,0,W,H);
  }

  // 竹子
  bamboos.forEach(b=>{
    const bg=ctx.createLinearGradient(b.x,H-b.h,b.x+b.w,H);
    bg.addColorStop(0,`hsl(${b.hue},${b.sat}%,${b.lit+6}%)`);
    bg.addColorStop(1,`hsl(${b.hue},${b.sat}%,${b.lit}%)`);
    ctx.fillStyle=bg;
    ctx.beginPath(); ctx.roundRect(b.x,H-b.h,b.w,b.h,3); ctx.fill();
    ctx.strokeStyle=`hsl(${b.hue},${b.sat-10}%,${b.lit-8}%)`;
    ctx.lineWidth=1.2;
    for(let s=H-b.h+24;s<H;s+=32){
      ctx.beginPath(); ctx.moveTo(b.x,s); ctx.lineTo(b.x+b.w,s); ctx.stroke();
    }
    const lx=b.x+b.w/2;
    [[-16,0,-.5],[12,-6,.4],[-6,-14,-.3]].forEach(([dx,dy,rot])=>{
      ctx.save(); ctx.translate(lx+dx,H-b.h+dy); ctx.rotate(rot);
      ctx.fillStyle=`hsl(${b.hue+5},60%,${b.lit+18}%)`;
      ctx.beginPath(); ctx.ellipse(0,0,13,5,0,0,Math.PI*2); ctx.fill();
      ctx.restore();
    });
  });

  // 草地
  const gg2=ctx.createLinearGradient(0,H-32,0,H);
  gg2.addColorStop(0,'#388e3c'); gg2.addColorStop(1,'#2e7d32');
  ctx.fillStyle=gg2; ctx.fillRect(0,H-32,W,32);
  for(let gx=6;gx<W;gx+=20){
    ctx.fillStyle=`hsl(120,${50+Math.sin(gx*.3)*10}%,${40+Math.sin(gx*.2)*6}%)`;
    ctx.beginPath();
    ctx.moveTo(gx,H-32); ctx.lineTo(gx+5,H-46); ctx.lineTo(gx+10,H-32);
    ctx.fill();
  }
}

/* ═══════════════════════════════════════════════
   熊猫绘制
═══════════════════════════════════════════════ */
function drawPanda(cx,cy,w,h,wobble,sq){
  const bw=w*.44,bh=h*.44;
  ctx.save(); ctx.translate(cx,cy); ctx.scale(1,sq);
  // 地面阴影
  ctx.fillStyle='rgba(0,0,0,.22)';
  ctx.beginPath(); ctx.ellipse(0,h*.56,bw*.9,7,0,0,Math.PI*2); ctx.fill();
  // 身体
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.ellipse(0,h*.18,bw*.92,bh*1.07,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#2a2a2a'; ctx.lineWidth=1.6; ctx.stroke();
  ctx.fillStyle='#f3f3f3';
  ctx.beginPath(); ctx.ellipse(0,h*.24,bw*.55,bh*.72,0,0,Math.PI*2); ctx.fill();
  // 头
  ctx.save(); ctx.rotate(Math.sin(wobble)*.08);
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.ellipse(0,-h*.18,bw*.80,bh*.80,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#2a2a2a'; ctx.lineWidth=1.6; ctx.stroke();
  // 耳
  [[-1],[1]].forEach(([s])=>{
    ctx.fillStyle='#222';
    ctx.beginPath(); ctx.ellipse(s*bw*.66,-h*.53,bw*.23,bh*.22,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#553344';
    ctx.beginPath(); ctx.ellipse(s*bw*.66,-h*.53,bw*.12,bh*.12,0,0,Math.PI*2); ctx.fill();
  });
  // 眼圈+眼
  [[-1],[1]].forEach(([s])=>{
    ctx.fillStyle='#2b2b2b';
    ctx.beginPath(); ctx.ellipse(s*bw*.32,-h*.22,bw*.27,bh*.25,s*.35,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.ellipse(s*bw*.32,-h*.22,bw*.14,bh*.14,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#111';
    ctx.beginPath(); ctx.arc(s*bw*.33,-h*.225,bw*.075,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(s*bw*.36,-h*.245,bw*.027,0,Math.PI*2); ctx.fill();
  });
  ctx.fillStyle='#3a3a3a';
  ctx.beginPath(); ctx.ellipse(0,-h*.09,bw*.12,bh*.075,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#333'; ctx.lineWidth=1.8;
  ctx.beginPath(); ctx.arc(-bw*.12,-h*.05,bw*.12,.08,Math.PI-.08); ctx.stroke();
  ctx.beginPath(); ctx.arc( bw*.12,-h*.05,bw*.12,.08,Math.PI-.08); ctx.stroke();
  [[-1],[1]].forEach(([s])=>{
    ctx.globalAlpha=.28; ctx.fillStyle='#ff9999';
    ctx.beginPath(); ctx.ellipse(s*bw*.55,-h*.06,bw*.18,bh*.11,0,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  });
  ctx.restore();
  // 四肢
  [[-1,.12,.5],[1,.12,.5],[-1,.1,-.1],[1,.1,-.1]].forEach(([s,rw,yo],i)=>{
    ctx.fillStyle=i<2?'#222':'#f5f5f5';
    ctx.strokeStyle='#2a2a2a'; ctx.lineWidth=1.2;
    ctx.beginPath();
    if(i<2) ctx.ellipse(s*bw*1.06,h*(.32+yo),bw*rw,bh*.19,s*.3,0,Math.PI*2);
    else    ctx.ellipse(s*bw*.78, h*(.55+yo),bw*.26,bh*.14,0,0,Math.PI*2);
    ctx.fill(); ctx.stroke();
  });
  ctx.restore();
}

/* ═══════════════════════════════════════════════
   普通竹笋
═══════════════════════════════════════════════ */
function drawBambooShoot(item){
  const s=Math.min(1,item.scaleIn);
  ctx.save(); ctx.translate(item.x,item.y); ctx.rotate(item.angle); ctx.scale(s,s);
  const g=ctx.createLinearGradient(-item.r,-item.r*1.6,item.r,item.r*1.5);
  g.addColorStop(0,'#d4f080'); g.addColorStop(.5,'#9ad830'); g.addColorStop(1,'#6aaa18');
  ctx.fillStyle=g;
  ctx.beginPath();
  ctx.moveTo(-item.r*.6,item.r*1.4); ctx.lineTo(item.r*.6,item.r*1.4);
  ctx.lineTo(item.r*.3,-item.r);     ctx.lineTo(-item.r*.3,-item.r);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle='#5a8820'; ctx.lineWidth=1.5; ctx.stroke();
  ctx.strokeStyle='#a0c840'; ctx.lineWidth=1.2;
  [-.2,.3,.8].forEach(t=>{
    ctx.beginPath();
    ctx.moveTo(-item.r*(.6-t*.08),item.r*t); ctx.lineTo(item.r*(.6-t*.08),item.r*t);
    ctx.stroke();
  });
  [[-item.r*.4,-item.r*1.5,.6],[item.r*.3,-item.r*1.3,-.5]].forEach(([lx,ly,lr])=>{
    ctx.save(); ctx.translate(lx,ly); ctx.rotate(lr);
    const lg=ctx.createLinearGradient(-10,0,10,0);
    lg.addColorStop(0,'#88dd38'); lg.addColorStop(1,'#55aa18');
    ctx.fillStyle=lg;
    ctx.beginPath(); ctx.ellipse(0,0,14,5,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });
  ctx.fillStyle='#78d038';
  ctx.beginPath();
  ctx.moveTo(0,-item.r*1.7); ctx.lineTo(-item.r*.4,-item.r); ctx.lineTo(item.r*.4,-item.r);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle='#4a9018'; ctx.lineWidth=1; ctx.stroke();
  ctx.globalAlpha=.22; ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.ellipse(-item.r*.1,0,item.r*.12,item.r*.7,-.3,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1;
  ctx.restore();
}

/* ═══════════════════════════════════════════════
   ★ 金色竹笋（新增道具）
═══════════════════════════════════════════════ */
function drawGoldenShoot(item){
  const s=Math.min(1,item.scaleIn);
  item.glowT = (item.glowT||0) + 0.05;
  const pulse = Math.sin(item.glowT*4)*.5+.5; // 0~1 脉冲

  ctx.save(); ctx.translate(item.x,item.y); ctx.rotate(item.angle); ctx.scale(s,s);

  // 外层金色光晕（脉冲）
  ctx.shadowColor='#ffd700';
  ctx.shadowBlur = 18+pulse*14;

  // 笋身（金色渐变）
  const g=ctx.createLinearGradient(-item.r,-item.r*1.6,item.r,item.r*1.5);
  g.addColorStop(0,'#fff9a0');
  g.addColorStop(.3,'#ffd700');
  g.addColorStop(.7,'#ff9500');
  g.addColorStop(1,'#c06000');
  ctx.fillStyle=g;
  ctx.beginPath();
  ctx.moveTo(-item.r*.65,item.r*1.45); ctx.lineTo(item.r*.65,item.r*1.45);
  ctx.lineTo(item.r*.32,-item.r*1.05); ctx.lineTo(-item.r*.32,-item.r*1.05);
  ctx.closePath(); ctx.fill();
  ctx.shadowBlur=0;
  ctx.strokeStyle='#b07800'; ctx.lineWidth=1.8; ctx.stroke();

  // 笋节（深金）
  ctx.strokeStyle='#c88800'; ctx.lineWidth=1.4;
  [-.25,.25,.75].forEach(t=>{
    ctx.beginPath();
    ctx.moveTo(-item.r*(.65-t*.08),item.r*t); ctx.lineTo(item.r*(.65-t*.08),item.r*t);
    ctx.stroke();
  });

  // 顶叶（亮金）
  [[-item.r*.45,-item.r*1.55,.65],[item.r*.35,-item.r*1.35,-.55]].forEach(([lx,ly,lr])=>{
    ctx.save(); ctx.translate(lx,ly); ctx.rotate(lr);
    const lg=ctx.createLinearGradient(-10,0,10,0);
    lg.addColorStop(0,'#ffe066'); lg.addColorStop(1,'#ffaa00');
    ctx.fillStyle=lg;
    ctx.beginPath(); ctx.ellipse(0,0,15,5.5,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });

  // 顶尖
  ctx.shadowColor='#ffd700'; ctx.shadowBlur=10;
  ctx.fillStyle='#ffe440';
  ctx.beginPath();
  ctx.moveTo(0,-item.r*1.85); ctx.lineTo(-item.r*.44,-item.r*1.05); ctx.lineTo(item.r*.44,-item.r*1.05);
  ctx.closePath(); ctx.fill();
  ctx.shadowBlur=0;
  ctx.strokeStyle='#c08000'; ctx.lineWidth=1; ctx.stroke();

  // 高光
  ctx.globalAlpha=.35; ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.ellipse(-item.r*.08,0,item.r*.13,item.r*.72,-.3,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1;

  // ★ 角标
  ctx.save(); ctx.translate(item.r*.55,-item.r*1.5);
  ctx.shadowColor='#ffd700'; ctx.shadowBlur=8;
  ctx.fillStyle='#fffde0'; ctx.font=`bold ${item.r*.9}px sans-serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('★',0,0);
  ctx.shadowBlur=0;
  ctx.restore();

  ctx.restore();
}

/* ═══════════════════════════════════════════════
   辣椒
═══════════════════════════════════════════════ */
function drawChili(item){
  const s=Math.min(1,item.scaleIn);
  ctx.save(); ctx.translate(item.x,item.y); ctx.rotate(item.angle); ctx.scale(s,s);
  ctx.shadowColor='#ff4400'; ctx.shadowBlur=12;
  const cg=ctx.createLinearGradient(-item.r,0,item.r,0);
  cg.addColorStop(0,'#ff2020'); cg.addColorStop(.5,'#ff6840'); cg.addColorStop(1,'#cc0808');
  ctx.fillStyle=cg;
  ctx.beginPath();
  ctx.moveTo(0,-item.r*1.5);
  ctx.bezierCurveTo( item.r*1.1,-item.r,  item.r*1.2, item.r*.4,  item.r*.2,item.r*1.4);
  ctx.bezierCurveTo(-item.r*.2, item.r*1.8,-item.r*.6, item.r,  -item.r*.8,item.r*.2);
  ctx.bezierCurveTo(-item.r*1.2,-item.r*.5,-item.r*.6,-item.r*1.2,0,-item.r*1.5);
  ctx.closePath(); ctx.fill();
  ctx.shadowBlur=0; ctx.strokeStyle='#991010'; ctx.lineWidth=1.5; ctx.stroke();
  ctx.globalAlpha=.28; ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.ellipse(-item.r*.15,-item.r*.5,item.r*.2,item.r*.5,-.3,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1;
  ctx.fillStyle='#1e8020';
  ctx.beginPath();
  ctx.moveTo(-item.r*.15,-item.r*1.4);
  ctx.bezierCurveTo(-item.r*.55,-item.r*2.1,item.r*.65,-item.r*2,item.r*.5,-item.r*1.5);
  ctx.lineTo(item.r*.1,-item.r*1.5); ctx.closePath(); ctx.fill();
  ctx.restore();
}

/* ═══════════════════════════════════════════════
   粒子系统（金色笋有专属超级爆炸）
═══════════════════════════════════════════════ */
// particles 和 floatTexts 已在全局声明

function spawnParticles(x,y,type){
  const configs={
    bamboo:{ cols:['#b8ff44','#d8ff88','#88ee22','#eeff88','#fff'], n:16, sp:160 },
    chili: { cols:['#ff4444','#ff8800','#ffcc00','#ff6666','#fff'], n:14, sp:140 },
    golden:{ cols:['#ffd700','#fff176','#ffaa00','#ff8c00','#fff9c4','#ffffff'], n:28, sp:220 }
  };
  const {cols,n,sp}=configs[type]||configs.bamboo;
  for(let i=0;i<n;i++){
    const a=(Math.PI*2*i/n)+Math.random()*.6;
    const s=sp*(.6+Math.random()*.8);
    particles.push({
      x,y,
      vx:Math.cos(a)*s, vy:Math.sin(a)*s-(type==='golden'?120:80),
      color:cols[i%cols.length],
      life:1, r:(type==='golden'?5:3)+Math.random()*(type==='golden'?6:5),
      shape:Math.random()<(type==='golden'?.7:.5)?'star':'circle',
      golden:type==='golden'
    });
  }
  // 金色笋额外：环形大粒子
  if(type==='golden'){
    for(let i=0;i<8;i++){
      const a=Math.PI*2*i/8;
      particles.push({
        x,y,
        vx:Math.cos(a)*80, vy:Math.sin(a)*80-40,
        color:'#ffd700', life:1.2, r:10,
        shape:'ring', golden:true
      });
    }
  }
}

function updateParticles(dt){
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{
    p.x+=p.vx*dt; p.y+=p.vy*dt;
    p.vy+=250*dt; p.vx*=.97;
    p.life-=(p.golden?1.4:2.0)*dt;
  });
}

function drawParticles(){
  particles.forEach(p=>{
    const a=Math.max(0,p.life);
    const r=p.r*Math.sqrt(Math.max(0,a));
    ctx.globalAlpha=a;
    ctx.fillStyle=p.color;
    if(p.golden){ ctx.shadowColor='#ffd700'; ctx.shadowBlur=8; }
    if(p.shape==='ring'){
      ctx.strokeStyle=p.color; ctx.lineWidth=3;
      ctx.beginPath(); ctx.arc(p.x,p.y,r,0,Math.PI*2); ctx.stroke();
    } else if(p.shape==='star'){
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.life*5);
      ctx.beginPath();
      for(let k=0;k<5;k++){
        const ang=k*(Math.PI*2/5)-Math.PI/2;
        k===0?ctx.moveTo(Math.cos(ang)*r,Math.sin(ang)*r):ctx.lineTo(Math.cos(ang)*r,Math.sin(ang)*r);
        const ia=ang+Math.PI/5;
        ctx.lineTo(Math.cos(ia)*r*.4,Math.sin(ia)*r*.4);
      }
      ctx.closePath(); ctx.fill(); ctx.restore();
    } else {
      ctx.beginPath(); ctx.arc(p.x,p.y,r,0,Math.PI*2); ctx.fill();
    }
    if(p.golden){ ctx.shadowBlur=0; }
  });
  ctx.globalAlpha=1;
}

/* ═══════════════════════════════════════════════
   飘字动画
═══════════════════════════════════════════════ */
function spawnFloatText(x,y,text,color,big=false){
  floatTexts.push({x,y:y-10,text,color,life:1,vy:-120,scale:0,scaleV:big?12:8,big});
}
function updateFloatTexts(dt){
  floatTexts=floatTexts.filter(f=>f.life>0);
  floatTexts.forEach(f=>{
    f.y+=f.vy*dt; f.vy*=.86;
    f.life-=1.5*dt;
    if(f.scale<1.4){ f.scale+=f.scaleV*dt; if(f.scale>=1.4){f.scale=1.4;f.scaleV=-3;} }
    else { f.scale+=f.scaleV*dt; if(f.scale<1) f.scale=1; }
  });
}
function drawFloatTexts(){
  floatTexts.forEach(f=>{
    const a=Math.max(0,f.life);
    ctx.save(); ctx.translate(f.x,f.y); ctx.scale(f.scale,f.scale);
    ctx.globalAlpha=a;
    ctx.font=`bold ${f.big?32:26}px "Segoe UI",sans-serif`;
    ctx.textAlign='center';
    if(f.big){ ctx.shadowColor='#ffd700'; ctx.shadowBlur=20; }
    ctx.lineWidth=f.big?5:4;
    ctx.strokeStyle='rgba(0,0,0,.65)'; ctx.strokeText(f.text,0,0);
    ctx.fillStyle=f.color; ctx.fillText(f.text,0,0);
    if(f.big) ctx.shadowBlur=0;
    ctx.restore();
  });
  ctx.globalAlpha=1; ctx.textAlign='left';
}

/* ═══════════════════════════════════════════════
   碰撞 & 输入
═══════════════════════════════════════════════ */
function checkCollision(it){
  const dx=it.x-panda.x, dy=it.y-(panda.y-panda.h*.08);
  return Math.sqrt(dx*dx+dy*dy)<(it.r+panda.w*.36);
}
document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(['ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup',e=>{keys[e.key]=false;});
gc.addEventListener('mousemove',e=>{
  const r=gc.getBoundingClientRect();
  if(gameRunning) panda.targetX=e.clientX-r.left;
});
gc.addEventListener('touchmove',e=>{
  e.preventDefault();
  const r=gc.getBoundingClientRect();
  if(gameRunning) panda.targetX=e.touches[0].clientX-r.left;
},{passive:false});

/* ═══════════════════════════════════════════════
   HUD 弹动
═══════════════════════════════════════════════ */
function popHUD(el){
  el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop');
  setTimeout(()=>el.classList.remove('pop'),220);
}

/* ═══════════════════════════════════════════════
   主循环
═══════════════════════════════════════════════ */
function gameLoop(ts){
  if(!lastTime) lastTime=ts;
  const dt=Math.min((ts-lastTime)/1000,.05);
  lastTime=ts;
  pandaWobble+=dt*4;

  if(keys['ArrowLeft'])  panda.targetX-=panda.speed*dt;
  if(keys['ArrowRight']) panda.targetX+=panda.speed*dt;
  panda.targetX=Math.max(panda.w/2,Math.min(W-panda.w/2,panda.targetX));
  const dpx=panda.targetX-panda.x;
  panda.x+=dpx*Math.min(1,11*dt);
  panda.x=Math.max(panda.w/2,Math.min(W-panda.w/2,panda.x));
  panda.squish+=(1-panda.squish)*8*dt;

  // 难度平滑
  const diff=getDifficulty();
  spawnInterval+=(Math.max(500,1350-score*3.5)-spawnInterval)*2*dt;
  speedFactor+=(Math.min(1+score*.006,3.2)-speedFactor)*1.5*dt;

  spawnTimer-=dt*1000;
  if(spawnTimer<=0){
    spawnItem();
    spawnTimer=spawnInterval*(.8+Math.random()*.4);
    $lvlVal.textContent=`Lv.${diff.level}`;
    $diffBadge.textContent=diff.label;
  }

  items.forEach(it=>{
    it.y+=it.vy*dt; it.angle+=it.spin*dt;
    if(it.scaleIn<1) it.scaleIn=Math.min(1,it.scaleIn+4*dt);
  });

  // 碰撞处理
  items=items.filter(it=>{
    if(!checkCollision(it)) return it.y<H+55;
    if(it.type==='bamboo'){
      score+=10;
      spawnParticles(it.x,it.y,'bamboo');
      spawnFloatText(it.x,it.y-10,'+10 🎋','#c0ff40');
      panda.squish=1.3; popHUD($scoreBox);
    } else if(it.type==='golden'){
      score+=50;
      spawnParticles(it.x,it.y,'golden');
      spawnFloatText(it.x,it.y-10,'+50 ★','#ffd700',true);
      goldenGlowT=0.6;
      panda.squish=1.5; popHUD($scoreBox); popHUD($bestBox);
    } else {
      score-=20;
      spawnParticles(it.x,it.y,'chili');
      spawnFloatText(it.x,it.y-10,'-20 🌶','#ff5555');
      shakeTimer=.35;
    }
    $scoreVal.textContent=score;
    // 实时更新最高分显示
    if(score>getBest()){
      $bestVal.textContent=score;
      popHUD($bestBox);
    }
    return false;
  });

  if(score<0){ doGameOver(); return; }

  updateParticles(dt); updateFloatTexts(dt);

  let sx=0,sy=0;
  if(shakeTimer>0){
    shakeTimer-=dt;
    const st=shakeTimer/.35;
    sx=(Math.random()-.5)*10*st; sy=(Math.random()-.5)*8*st;
  }
  ctx.save(); ctx.translate(sx,sy);
  drawBackground(dt);
  items.forEach(it=>{
    if(it.type==='bamboo') drawBambooShoot(it);
    else if(it.type==='golden') drawGoldenShoot(it);
    else drawChili(it);
  });
  drawParticles(); drawFloatTexts();
  drawPanda(panda.x,panda.y,panda.w,panda.h,pandaWobble,panda.squish);

  // 速度条
  const barW=Math.max(0,(speedFactor-1)/2.2*160);
  ctx.fillStyle='rgba(0,0,0,.28)';
  ctx.beginPath(); ctx.roundRect(W-178,H-18,164,8,4); ctx.fill();
  if(barW>0){
    const bg=ctx.createLinearGradient(W-176,0,W-176+barW,0);
    bg.addColorStop(0,'#80ff40'); bg.addColorStop(1,'#ff4040');
    ctx.fillStyle=bg;
    ctx.beginPath(); ctx.roundRect(W-176,H-16,barW,4,2); ctx.fill();
  }
  ctx.fillStyle='rgba(255,255,255,.38)';
  ctx.font='10px sans-serif'; ctx.textAlign='right';
  ctx.fillText('速度',W-182,H-10); ctx.textAlign='left';
  ctx.restore();

  animId=requestAnimationFrame(gameLoop);
}

/* ═══════════════════════════════════════════════
   ★ 游戏结束画面（全新设计）
═══════════════════════════════════════════════ */
function doGameOver(){
  cancelAnimationFrame(animId);
  gameRunning=false;
  // 等一帧让最后画面渲染完
  setTimeout(()=>showGameOverScreen(Math.max(0,score+20)), 280);
}

function showGameOverScreen(finalScore){
  const isNew = saveBest(finalScore);
  const best  = getBest();
  const hist  = getHist();

  // 更新 HUD 最高分
  $bestVal.textContent = best;

  $screen.classList.add('dim');
  animateStars();

  // 历史榜 HTML
  const histHTML = hist.length>1 ? `
    <div class="hist-title">近期记录</div>
    <div class="hist-list">
      ${hist.map((s,i)=>`<span class="hist-chip${i===0?' first':''}">${i===0?'🏅':('No.'+(i+1))}&ensp;${s}</span>`).join('')}
    </div>
  ` : '';

  $card.innerHTML=`
    <div class="over-title ${isNew?'record':'normal'}">${isNew?'🎉 新纪录！':'😢 游戏结束'}</div>
    ${isNew?'<div class="record-badge">🏆 BEST SCORE</div>':''}
    <div style="color:#888;font-size:.85rem;margin-top:${isNew?'2px':'10px'}">本局得分</div>
    <div class="score-display">${finalScore}</div>
    <div class="stat-row">
      <div class="stat-box"><b>${best}</b>历史最高</div>
      <div class="stat-box"><b>${hist.length}</b>游玩次数</div>
    </div>
    ${histHTML}
    <div style="display:flex;gap:10px;justify-content:center">
      <button class="btn" id="replayBtn">再来一局 ▶</button>
      <button class="btn btn-secondary" id="menuBtn">返回主页</button>
    </div>
    <div class="hint">🎋 竹笋+10 &ensp; ★ 金笋+50 &ensp; 🌶 辣椒-20</div>
  `;
  $screen.style.display='flex';

  // 新纪录烟花
  if(isNew) launchFireworks();

  document.getElementById('replayBtn').addEventListener('click',startGame,{once:true});
  document.getElementById('menuBtn').addEventListener('click',()=>{
    stopFireworks(); showStartScreen();
  },{once:true});
}

/* ═══════════════════════════════════════════════
   ★ 开始画面
═══════════════════════════════════════════════ */
function showStartScreen(){
  gameRunning=false;
  $screen.classList.remove('dim');
  sctx.clearRect(0,0,W,H);
  animateStars();
  const best=getBest();

  $card.innerHTML=`
    <div class="title-text">🐼 熊猫接笋</div>
    <div class="subtitle">PANDA CATCH</div>
    <div class="rules">
      <div class="rule-item">🎋 竹笋<br><b class="pos">+10 分</b></div>
      <div class="rule-item" style="border-color:rgba(255,210,50,.3);background:rgba(255,200,30,.07)">
        ★ 金笋<br><b class="gold">+50 分</b>
      </div>
      <div class="rule-item">🌶 辣椒<br><b class="neg">−20 分</b></div>
      <div class="rule-item">📉 归零<br><b class="neg">结束</b></div>
    </div>
    ${best>0?`<div style="color:#ffd740;font-size:.85rem;margin-bottom:14px">🏆 最高分：<b>${best}</b></div>`:''}
    <button class="btn" id="startBtn">开始游戏 ▶</button>
    <div class="hint">🖱 鼠标 / 👆 触摸 / ← → 键盘</div>
  `;
  $screen.style.display='flex';
  document.getElementById('startBtn').addEventListener('click',startGame,{once:true});
}

function startGame(){
  stopFireworks();
  $screen.style.display='none';
  $screen.classList.remove('dim');
  sctx.clearRect(0,0,W,H);
  cancelAnimationFrame(animId);
  initGame();
  gameRunning=true;
  animId=requestAnimationFrame(gameLoop);
}

/* ═══════════════════════════════════════════════
   CSS 烟花特效（新纪录时）
═══════════════════════════════════════════════ */
let fwIntervalId=null;
const fwEl=[];

function launchFireworks(){
  stopFireworks();
  const wrap=document.getElementById('wrap');
  fwIntervalId=setInterval(()=>{
    const colors=['#ffd700','#ff6b6b','#74ff74','#74b9ff','#fd79a8','#a29bfe'];
    const cx=Math.random()*W, cy=Math.random()*(H*.6)+30;
    for(let i=0;i<14;i++){
      const el=document.createElement('div');
      el.className='firework';
      const c=colors[Math.floor(Math.random()*colors.length)];
      const angle=Math.PI*2*i/14;
      const dist=60+Math.random()*80;
      const tx=Math.cos(angle)*dist, ty=Math.sin(angle)*dist;
      el.style.cssText=`
        left:${cx}px;top:${cy}px;
        background:${c};
        box-shadow:0 0 6px ${c};
        transform:translate(-50%,-50%);
        transition:transform .7s ease-out,opacity .7s ease-out;
      `;
      wrap.appendChild(el);
      fwEl.push(el);
      requestAnimationFrame(()=>{
        el.style.transform=`translate(calc(-50% + ${tx}px),calc(-50% + ${ty}px))`;
        el.style.opacity='0';
      });
      setTimeout(()=>{ el.remove(); const idx=fwEl.indexOf(el); if(idx>-1) fwEl.splice(idx,1); },750);
    }
  },380);
}

function stopFireworks(){
  if(fwIntervalId){ clearInterval(fwIntervalId); fwIntervalId=null; }
  fwEl.forEach(e=>e.remove()); fwEl.length=0;
}

/* ── 启动 ── */
showStartScreen();
</script>
